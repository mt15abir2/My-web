<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Walton Official Ramadan Gift 2026</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --walton-blue: #0054a6; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f9; margin: 0; padding: 0; text-align: center; }
        .container { max-width: 500px; margin: auto; background: white; min-height: 100vh; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        .header { background: white; padding: 20px; border-bottom: 4px solid var(--walton-blue); }
        .header img { width: 200px; }
        .welcome-box { background: var(--walton-blue); color: white; padding: 20px; margin-bottom: 10px; }
        .progress-box { padding: 20px; }
        .p-bg { background: #eee; border-radius: 20px; height: 25px; position: relative; overflow: hidden; border: 1px solid #ccc; }
        .p-fill { width: 0%; height: 100%; background: #28a745; transition: 0.5s; }
        .p-text { position: absolute; width: 100%; top:0; font-weight: bold; line-height: 25px; color: #000; }
        .quiz-area { padding: 30px 20px; margin: 20px; border: 1px solid #ddd; border-radius: 15px; }
        .opt { display: block; width: 100%; padding: 15px; margin: 10px 0; border: 2px solid #eee; border-radius: 10px; background: #f9f9f9; cursor: pointer; font-size: 18px; font-weight: bold; }
        .opt:hover { border-color: var(--walton-blue); background: #eef5ff; }
        #share-part { display: none; padding: 30px 20px; }
        .s-btn { display: block; padding: 18px; margin: 15px 0; color: white; text-decoration: none; border-radius: 10px; font-weight: bold; font-size: 18px; }
        .wa { background: #25d366; } .ms { background: #0084ff; }
        .comment-sec { text-align: left; padding: 20px; border-top: 5px solid #eee; }
        .c-item { display: flex; margin-bottom: 15px; }
        .c-img { width: 50px; height: 50px; border-radius: 50%; margin-right: 10px; }
        .c-txt { background: #f0f2f5; padding: 10px; border-radius: 15px; flex: 1; font-size: 14px; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <img src="walton-logo.png" alt="Walton">
    </div>

    <div class="welcome-box">
        <h2>অভিনন্দন! আপনাকে স্বাগতম</h2>
        <p>ওয়ালটন রমজান স্পেশাল মেগা গিফট ২০২৬</p>
    </div>

    <div class="progress-box">
        <div class="p-bg">
            <div class="p-fill" id="p-fill"></div>
            <div class="p-text" id="p-text">Progress: 0%</div>
        </div>
    </div>

    <div id="quiz-part">
        <div class="quiz-area">
            <h3 id="q-txt">Question 1: ওয়ালটন কোন দেশের ১ নম্বর ব্র্যান্ড?</h3>
            <button class="opt" id="opt1">বাংলাদেশ</button>
            <button class="opt" id="opt2">অন্যান্য</button>
        </div>
    </div>

    <div id="share-part">
        <h2 style="color: var(--walton-blue);">🎉 কুইজ শেষ!</h2>
        <p>পুরস্কারটি পেতে ২০ বার শেয়ার করুন।</p>
        <a href="javascript:void(0)" class="s-btn wa" onclick="shareClick()"><i class="fab fa-whatsapp"></i> WhatsApp শেয়ার</a>
        <a href="javascript:void(0)" class="s-btn ms" onclick="shareClick()"><i class="fab fa-messenger"></i> Messenger শেয়ার</a>
    </div>

    <div class="comment-sec">
        <h4>Recent Comments (1,248)</h4>
        <div class="c-item">
            <img src="https://randomuser.me/api/portraits/men/32.jpg" class="c-img">
            <div class="c-txt">
                <strong>সায়েম আহমেদ</strong> <span style="color:#1da1f2">✓ Winner</span>
                <p>সবগুলো কুইজ শেষ করলাম। আশা করি গিফটটা পাবো।</p>
            </div>
        </div>
    </div>
</div>

<script>
    const quizData = [
        { q: "ওয়ালটন কোন দেশের ১ নম্বর ব্র্যান্ড?", a: ["বাংলাদেশ", "অন্যান্য"], c: 0 },
        { q: "ওয়ালটন ফ্রিজে কি ইনভার্টার প্রযুক্তি আছে?", a: ["হ্যাঁ", "না"], c: 0 },
        { q: "আপনি কি ওয়ালটন পণ্য পছন্দ করেন?", a: ["হ্যাঁ", "না"], c: 0 }
    ];

    let currentStep = 0;
    let shareCount = 0;

    function displayQuestion() {
        if (currentStep < quizData.length) {
            document.getElementById('q-txt').innerText = `Question ${currentStep + 1}: ${quizData[currentStep].q}`;
            document.getElementById('opt1').innerText = quizData[currentStep].a[0];
            document.getElementById('opt2').innerText = quizData[currentStep].a[1];
            
            document.getElementById('opt1').onclick = () => checkAnswer(0);
            document.getElementById('opt2').onclick = () => checkAnswer(1);
        } else {
            document.getElementById('quiz-part').style.display = 'none';
            document.getElementById('share-part').style.display = 'block';
        }
    }

    function checkAnswer(selected) {
        if (selected === quizData[currentStep].c) {
            currentStep++;
            updateUI((currentStep / quizData.length) * 50);
            displayQuestion();
        } else {
            alert("সঠিক উত্তর দিন!");
        }
    }

    function shareClick() {
        shareCount++;
        let prog = 50 + (shareCount * 2.5);
        updateUI(prog > 100 ? 100 : prog);
        
        // এখানে কোনো window.open(adLink) নেই, তাই অ্যাড আসবে না
        const shareMsg = encodeURIComponent("ওয়ালটন রমজান গিফট জিতুন এখানে ক্লিক করে!");
        window.open(`https://api.whatsapp.com/send?text=${shareMsg}`, '_blank');
        
        if (prog >= 100) alert("অভিনন্দন! আপনার কাজ শেষ।");
    }

    function updateUI(val) {
        document.getElementById('p-fill').style.width = val + "%";
        document.getElementById('p-text').innerText = "Progress: " + Math.floor(val) + "%";
    }

    displayQuestion(); // প্রথম প্রশ্ন দেখানোর জন্য
</script>

</body>
</html>
